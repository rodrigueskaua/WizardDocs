services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - CHROMA_HOST=chroma
    depends_on:
      - chroma

  chroma:
    image: chromadb/chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0

volumes:
  chroma_data: