version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - ./backend/app:/app
      - ./backend/data/chromadb:/data/chromadb
    env_file:
      - ./backend/.env
    restart: always
