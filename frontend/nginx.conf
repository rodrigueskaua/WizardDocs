server {
    listen 80;

    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Faz com que todas as rotas sejam redirecionadas para o Vue Router (SPA)
    location / {
        try_files $uri /index.html;
    }

    # Redireciona erros 404 para o index.html (para SPA)
    error_page 404 /index.html;
}
